name: Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate screenshot assets
        run: |
          ls -1 docs/public/screenshots/*.png
          uniq_hashes=$(sha256sum docs/public/screenshots/*.png | awk '{print $1}' | sort -u | wc -l)
          if [ "$uniq_hashes" -lt 3 ]; then
            echo "Screenshot set looks suspicious (too many duplicates)."
            exit 1
          fi

          if file docs/public/screenshots/dashboard.png | grep -q '1 x 1'; then
            echo "dashboard.png appears to be a 1x1 placeholder."
            exit 1
          fi

      - name: Build docs
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
