services:
  anomalist:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - anomalist_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/anomalist.db
      - OWNER_TOKEN=${OWNER_TOKEN:-change-me}
    restart: unless-stopped

volumes:
  anomalist_data:
